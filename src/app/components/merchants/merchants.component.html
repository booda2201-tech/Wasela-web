<section
  class="merchants-page max-lg:py-10 max-lg:sm:py-12 max-lg:md:py-14 max-lg:bg-gradient-to-b max-lg:from-[#FAFBFF] max-lg:via-white max-lg:to-[#F2F4FF] lg:bg-white"
  *ngIf="!loading && !loadError && page"
>
  <div
    class="container mx-auto px-4 sm:px-6 max-lg:py-8 max-lg:md:py-10"
  >
    <div class="merchants-page-stage">
      <div class="merchants-glow-stage" aria-hidden="true">
        <div class="merchants-glow-stage__img"></div>
      </div>
    <div
      class="max-lg:mb-10 max-lg:rounded-[1.75rem] max-lg:border max-lg:border-white/70 max-lg:bg-white/80 max-lg:backdrop-blur-xl max-lg:shadow-[0_12px_48px_-18px_rgba(29,29,219,0.2)] max-lg:p-6 max-lg:sm:p-8 lg:contents"
      *ngIf="heroSection() as hero"
    >
      <div
        class="merchants-hero-content text-center px-2 md:px-4 max-lg:mb-0"
      >
        <div class="merchants-hero-main">
        <h2 class="merchants-hero-title max-lg:mb-4 max-lg:text-[2rem] max-lg:tracking-[-0.01em] max-lg:font-black max-lg:text-[#1D1DDB]">
          {{ hero.title }}
        </h2>
        <p
          class="merchants-hero-desc merchants-preline max-lg:mb-6 max-lg:mx-auto max-lg:max-w-[30rem] max-lg:sm:max-w-md"
        >
          {{ hero.description }}
        </p>
        </div>
        <div
          class="merchants-count-box flex items-center justify-center max-lg:mb-0 max-lg:rounded-2xl 
          max-lg:border max-lg:border-[#E2E8FF] max-lg:bg-gradient-to-r max-lg:from-[#F8FAFF] 
          max-lg:to-[#EEF2FF] max-lg:px-0 max-lg:py-6 max-lg:sm:px-0 
          max-lg:sm:py-0 max-lg:shadow-[inset_0_1px_0_rgba(255,255,255,0.9)]"
          *ngIf="merchantsCountSection() as countSection"
        >
          <div class="merchants-count-inner">
            <h1 class="merchants-count-title font-black">
              {{ countSection.title }}
            </h1>

            <div class="brand-icon shrink-0">
              <span class="merchants-count-toggle" aria-hidden="true"></span>
            </div>
          </div>
        </div>

        <a
          routerLink="/join-us"
          class="download-btn merchants-join-btn mx-auto max-lg:mt-5 no-underline"
        >
          <span class="download-btn__label">
            {{
              merchantsCountSection()?.buttonText ||
                hero.buttonText ||
                'Join our merchant Network'
            }}
          </span>
          <span class="icon-circle" aria-hidden="true">
            <i class="bi bi-arrow-up-right"></i>
          </span>
        </a>
      </div>
    </div>

    <ng-template #merchantCard let-m="merchant" let-cls="cls" let-lgFlex="lgFlex" let-lgHoverFlex="lgHoverFlex">
      <div
        class="merchant-col__card group relative overflow-hidden rounded-[1.25rem] sm:rounded-2xl cursor-pointer w-full shadow-md max-lg:transition-all max-lg:duration-700 smooth-accordion min-h-0 max-lg:shadow-[0_28px_56px_-32px_rgba(15,23,42,0.55)] max-lg:ring-1 max-lg:ring-white/40 max-lg:active:scale-[0.985] max-lg:duration-300 lg:rounded-[2rem] lg:shadow-md lg:ring-0 lg:active:scale-100"
        [ngClass]="cls"
        [ngStyle]="
          lgFlex != null
            ? { '--card-flex': lgFlex, '--card-hover-flex': lgHoverFlex }
            : {}
        "
      >
        <img
          *ngIf="backgroundSrc(m) as bg"
          [src]="bg"
          class="merchant-col__card-bg absolute inset-0 size-full object-cover max-lg:transition-transform max-lg:duration-1000 will-change-transform max-lg:scale-[1.04] max-lg:group-hover:scale-[1.06] max-lg:group-active:scale-[1.02]"
          [alt]="m.title || 'Merchant background'"
          loading="lazy"
          decoding="async"
        />

        <div
          class="merchant-col__card-overlay absolute inset-0 pointer-events-none transition-opacity duration-700 max-lg:bg-gradient-to-t max-lg:from-black/60 max-lg:via-black/20 max-lg:to-transparent max-lg:opacity-100"
        ></div>

        <div class="merchant-col__card-logo-wrap absolute inset-0 flex items-center justify-center pointer-events-none">
          <img
            *ngIf="logoSrc(m) as logo"
            [src]="logo"
            class="merchant-col__card-logo object-contain max-lg:drop-shadow-[0_10px_28px_rgba(0,0,0,0.45)]"
            [alt]="m.title || 'Merchant logo'"
            loading="lazy"
            decoding="async"
          />
        </div>
      </div>
    </ng-template>

    <!-- موبايل وتابلت: سلايدر -->
    <div
      class="merchants-page-swiper-wrap -mx-4 px-1 sm:-mx-6 sm:px-2 lg:hidden"
      *ngIf="merchantItemsList.length"
    >
      <swiper-container
        #merchantsSwiperMobile
        init="false"
        class="merchants-page-swiper"
      >
        <swiper-slide
          *ngFor="let merchant of merchantItemsList; let i = index; trackBy: trackByMerchantId"
          class="merchants-page-swiper-slide"
        >
          <ng-container
            *ngTemplateOutlet="
              merchantCard;
              context: { merchant: merchant, cls: cardClassForMerchantIndex(i) }
            "
          ></ng-container>
        </swiper-slide>
      </swiper-container>
    </div>

    <!-- ديسكتوب: 4 أعمدة — هوفر يكبّر الكرت ويصغّر اللي فوقه وتحته (نفس سلوك الفيجما) -->
    <div
      class="merchants-desktop-grid hidden lg:grid lg:grid-cols-4 lg:gap-6"
      *ngIf="merchantItemsList.length"
    >
      <div
        *ngFor="let col of columnsLayout; let colIndex = index; trackBy: trackByColumnIndex"
        class="merchants-desktop-col"
      >
        <ng-container
          *ngFor="let merchant of col; let rowIndex = index; trackBy: trackByMerchantId"
        >
          <ng-container
            *ngTemplateOutlet="
              merchantCard;
              context: {
                merchant: merchant,
                cls: cardClass(rowIndex, colIndex),
                lgFlex: cardFlexWeight(rowIndex, colIndex),
                lgHoverFlex: cardHoverFlexWeight(rowIndex, colIndex)
              }
            "
          ></ng-container>
        </ng-container>
      </div>
    </div>
    </div>
  </div>
</section>

<div class="py-20 text-center" *ngIf="loading">Loading...</div>
<div class="py-20 text-center text-red-500" *ngIf="loadError">
  فشل في تحميل صفحة Merchants.
</div>
