<section class="careers-page relative bg-white overflow-hidden pt-20 pb-10 md:pb-20">
  <div class="careers-hero__glow" aria-hidden="true">
    <div class="careers-hero__glow-img"></div>
  </div>

  <div class="container mx-auto px-4 md:px-6 relative z-10">
  <header class="careers-hero relative overflow-hidden">
    <div class="relative z-10 py-8 md:py-10 text-center">
      <div class="max-w-2xl mx-auto space-y-2 md:space-y-4">
        <h1 class="text-[2rem] md:text-[42px] font-[900] text-[#1D1DDB] leading-[1.1]">
            Careers
          </h1>
          <p class="max-w-lg mx-auto">
            Join a team of innovators, designers, and engineers working together to shape the future of digital financial experiences.
          </p>
      </div>
    </div>
  </header>

  <div class="careers-jobs-list space-y-3 md:space-y-4 mt-4 md:mt-2">
    <article
      #jobCard
      *ngFor="let job of jobs"
      class="job-card flex flex-col"
    >
      <div class="job-card__head flex flex-col gap-2.5 md:gap-3 md:flex-row md:justify-between md:items-center">
        <div class="min-w-0 space-y-1.5 text-left flex-1">
          <span class="job-card__badge">
            {{ job.roleLabel }}
          </span>
          <h2 class="job-card__title">
            {{ job.title }}
          </h2>
          <p *ngIf="job.metaSegments.length" class="careers-job-meta job-card__meta">
            <ng-container *ngFor="let seg of job.metaSegments; let last = last">
              <span class="careers-job-meta__text">{{ seg }}</span>
              <span *ngIf="!last" class="careers-job-meta__dot" aria-hidden="true"></span>
            </ng-container>
          </p>
        </div>

        <div class="job-card__actions flex items-center justify-between md:justify-end gap-2 flex-shrink-0 w-full md:w-auto">
          <button
            type="button"
            (click)="toggle(job.id)"
            class="job-card__toggle flex-shrink-0 rounded-full bg-white border border-[#1D1DDB] flex items-center 
            justify-center hover:bg-gray-50 transition-colors duration-300 focus:outline-none 
            focus-visible:ring-2 focus-visible:ring-[#1D1DDB] focus-visible:ring-offset-2"
            [attr.aria-expanded]="isExpanded(job.id)"
            [attr.aria-controls]="'job-desc-' + job.id"
            [attr.id]="'job-toggle-' + job.id"
          >
             <i class="bi bi-chevron-down text-orange-500" [class.rotate-180]="isExpanded(job.id)" aria-hidden="true"></i>
          </button>

          <button type="button" class="download-btn shrink-0">
            <span class="download-btn__label">Submit Application</span>
            <span class="icon-circle" aria-hidden="true">
              <i class="bi bi-arrow-up-right"></i>
            </span>
          </button>
        </div>
      </div>

      <div
        #jobDescPanel
        class="job-desc-panel overflow-hidden h-0"
        [attr.id]="'job-desc-' + job.id"
        role="region"
        [attr.aria-labelledby]="'job-toggle-' + job.id"
        [attr.aria-hidden]="!isExpanded(job.id)"
      >
        <div class="job-card__desc-inner text-left">
          <h3 class="job-card__desc-title">Job Description</h3>
          <div class="job-card__desc-body space-y-3">
            <p *ngFor="let paragraph of job.descriptionParagraphs" class="careers-preline">{{ paragraph }}</p>
          </div>
        </div>
      </div>
    </article>
  </div>
  </div>
</section>

<app-page-loader *ngIf="loading"></app-page-loader>
<div class="py-20 text-center text-red-500" *ngIf="loadError">
  تعذر تحميل صفحة الوظائف.
</div>
