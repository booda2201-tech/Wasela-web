<section class="faq-section relative bg-white overflow-hidden">
  <header class="faq-header relative overflow-hidden">
    <div class="faq-header__visual absolute inset-0 pointer-events-none" aria-hidden="true">
      <div class="faq-header__img"></div>
      <div class="faq-header__wash"></div>
    </div>

    <div class="relative z-10 container mx-auto px-6 py-36 text-center">
      <div class="max-w-4xl mx-auto space-y-4">
        <h1 class="text-4xl md:text-[50px] font-[900] text-[#1D1DDB] leading-[1.1]">
          FAQs
        </h1>
        <p class="text-gray-500 text-lg md:text-xl font-medium leading-relaxed">
          Find clear answers to common questions about our services, features, security practices, and how our platform works.
        </p>
      </div>
    </div>
  </header>

  <div class="faq-body relative px-6 pb-20 pt-2">
    <div class="faq-decor" aria-hidden="true">
      <div class="faq-decor__orange"></div>
      <div class="faq-decor__blue"></div>
    </div>

    <div class="faq-inner container mx-auto relative z-10">
      <div class="mx-auto max-w-4xl space-y-4">
        <article
          #faqCard
          *ngFor="let item of faqs"
          class="faq-card relative z-10 bg-white rounded-[20px] border border-gray-100 shadow-sm"
        >
          <button
            type="button"
            class="faq-trigger w-full flex justify-between items-center gap-4 text-left p-5 md:p-6 focus:outline-none focus-visible:ring-2 focus-visible:ring-[#1D1DDB]/30 focus-visible:ring-offset-2 rounded-[20px]"
            (click)="toggle(item.id)"
            [attr.aria-expanded]="isExpanded(item.id)"
            [attr.aria-controls]="'faq-answer-' + item.id"
            [attr.id]="'faq-q-' + item.id"
          >
            <span class="font-bold text-[#1D1DDB] text-base md:text-lg leading-snug pr-2">
              {{ item.question }}
            </span>

            <span class="relative flex h-9 w-9 flex-shrink-0 items-center justify-center text-[#1D1DDB]">
              <svg
                class="faq-icon-plus absolute h-6 w-6 transition-opacity duration-300 ease-out"
                [class.opacity-0]="isExpanded(item.id)"
                [class.scale-75]="isExpanded(item.id)"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path stroke-linecap="round" stroke-width="2.2" d="M12 5v14M5 12h14" />
              </svg>
              <svg
                class="faq-icon-close absolute h-6 w-6 transition-opacity duration-300 ease-out"
                [class.opacity-0]="!isExpanded(item.id)"
                [class.scale-75]="!isExpanded(item.id)"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path stroke-linecap="round" stroke-width="2.2" d="M6 6l12 12M18 6L6 18" />
              </svg>
            </span>
          </button>

          <div
            #faqPanel
            class="faq-answer-panel overflow-hidden h-0"
            [attr.id]="'faq-answer-' + item.id"
            role="region"
            [attr.aria-labelledby]="'faq-q-' + item.id"
            [attr.aria-hidden]="!isExpanded(item.id)"
          >
            <div class="faq-answer-inner px-5 md:px-6 pb-5 md:pb-6 pt-0 border-t border-gray-100">
              <p class="text-gray-600 text-sm md:text-base font-medium leading-relaxed pt-4">
                {{ item.answer }}
              </p>
            </div>
          </div>
        </article>
      </div>
    </div>
  </div>
</section>
