<section class="blogs-page relative overflow-x-clip bg-white pb-16 pt-24 md:pb-24">
  <div class="blogs-page__bg" aria-hidden="true">
    <div class="blogs-page__bg-slide blogs-page__bg-slide--back"></div>
    <div class="blogs-page__bg-slide blogs-page__bg-slide--mid"></div>
    <div class="blogs-page__bg-wash"></div>
  </div>

  <div class="blogs-page__inner relative z-[1] mx-auto max-w-[1280px] px-4 sm:px-6 lg:px-8">
    <header class="blogs-header text-center" data-blogs-heading>
      <h1 class="blogs-header__title">{{ pageTitle }}</h1>
      <p class="blogs-header__subtitle">{{ pageSubtitle }}</p>
    </header>

    <!-- بطاقة مميزة + Link.png خلف الزاوية (ديكور) -->
    <div class="blogs-featured-wrap relative mx-auto mt-10 max-w-[1251px] md:mt-12">
      <div class="blogs-featured__decor" aria-hidden="true">
        <img
          [src]="featured.decorSrc"
          alt=""
          class="blogs-featured__decor-img"
          loading="lazy"
        />
      </div>

      <a
        data-blogs-featured
        class="blogs-featured"
        [href]="featured.href"
      >
        <div class="blogs-featured__media">
          <img
            [src]="featured.imageSrc"
            alt=""
            class="blogs-featured__img"
            loading="lazy"
          />
          <p *ngIf="featured.showHeadline" class="blogs-featured__headline">
            {{ featured.headline }}
          </p>
        </div>

        <div class="blogs-featured__panel">
          <span class="blogs-tag blogs-tag--panel">{{ featured.tag }}</span>
          <div class="blogs-featured__meta">
            <i class="bi bi-calendar3 blogs-featured__cal" aria-hidden="true"></i>
            <span class="blogs-featured__date">{{ featured.date }}</span>
          </div>
          <h2 class="blogs-featured__kicker">{{ featured.kicker }}</h2>
          <p class="blogs-featured__excerpt">{{ featured.excerpt }}</p>
          <span class="blogs-featured__more">Continue reading</span>
        </div>
      </a>
    </div>

    <!-- شبكة 3 بطاقات -->
    <div
      class="blogs-grid mx-auto mt-12 flex max-w-[1251px] flex-col flex-wrap justify-center gap-5 md:mt-16 md:flex-row md:gap-6"
    >
      <article
        *ngFor="let post of posts"
        data-blog-card
        class="blogs-card mx-auto w-full max-w-[400px] shrink-0 overflow-hidden rounded-xl bg-white shadow-[9px_9px_15px_rgba(0,0,0,0.1)] md:mx-0 md:w-[calc(33.333%-1rem)] md:max-w-[399.914px]"
      >
        <a class="blogs-card__link block text-inherit no-underline" href="#">
          <div class="blogs-card__thumb-wrap relative overflow-hidden rounded-t-[5px]">
            <img
              [src]="post.imageSrc"
              alt=""
              class="blogs-card__thumb"
              loading="lazy"
            />
            <span class="blogs-tag blogs-tag--float">{{ post.tag }}</span>
          </div>
          <div class="blogs-card__body px-6 pb-8 pt-8 md:px-7">
            <div class="blogs-card__meta">
              <i class="bi bi-calendar3 blogs-card__cal" aria-hidden="true"></i>
              <span class="blogs-card__date">{{ post.date }}</span>
            </div>
            <h3 class="blogs-card__title">{{ post.title }}</h3>
            <p class="blogs-card__excerpt">{{ post.excerpt }}</p>
          </div>
        </a>
      </article>
    </div>

    <!-- ترقيم الصفحات -->
    <nav
      class="blogs-pagination mx-auto mt-14 flex flex-wrap items-center justify-center gap-0.5 md:mt-16"
      aria-label="Blog pagination"
    >
      <ng-container *ngFor="let p of paginationPages">
        <span
          *ngIf="p === 'ellipsis'"
          class="blogs-pagination__item blogs-pagination__item--muted"
          aria-hidden="true"
          >…</span
        >
        <button
          *ngIf="p !== 'ellipsis'"
          type="button"
          class="blogs-pagination__btn"
          [class.blogs-pagination__btn--active]="p === currentPage"
          [attr.aria-current]="p === currentPage ? 'page' : null"
        >
          {{ p }}
        </button>
      </ng-container>
    </nav>
  </div>
</section>
