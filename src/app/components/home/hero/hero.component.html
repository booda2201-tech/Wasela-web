<section class="hero-section hero-desktop" aria-label="Hero">
  <!-- طبقة البيل الكبيرة (تكبر وتملأ المشهد كما في الفيديو) -->
  <div class="hero-mega-pill" aria-hidden="true"></div>

  <!-- التوجل الصغير: مسار + كرة (مرحلة البداية والنهاية) -->
  <div class="hero-toggle" aria-hidden="true">
    <div class="pill-track"></div>
    <div class="orange-ball"></div>
  </div>

  <div class="hero-headline">
    <span class="h-line h1 line-enabling">Enabling</span>
    <span class="h-line h2 line-what">What</span>
    <span class="h-line h3 line-matters">Matters</span>
  </div>

  <div class="hero-gif-wrap" aria-hidden="true">
    <img
      src="../../../../assets/gif/header-screen-v2 2.gif"
      alt=""
      class="hero-gif"
      loading="eager"
    />
  </div>

  <div class="hero-cta">
    <a class="explore-btn" href="#">
      <span class="explore-label">Explore Now</span>
      <span class="arrow-circle" aria-hidden="true">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path
            d="M2 7h10M8 3l4 4-4 4"
            stroke="white"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </span>
    </a>
    <div class="store-buttons">
      <a class="store-badge" href="#" rel="noopener noreferrer">
        <img
          src="assets/images/app-store.png"
          alt="Download on the App Store"
          width="154"
          height="48"
          loading="lazy"
        />
      </a>
      <a class="store-badge" href="#" rel="noopener noreferrer">
        <img
          src="assets/images/google-play.png"
          alt="Get it on Google Play"
          width="154"
          height="48"
          loading="lazy"
        />
      </a>
    </div>
  </div>

  <p class="powered-by">Powered by AUR Capital</p>
</section>

<section class="hero-mobile" aria-label="Hero Mobile">
  <div class="hero-mobile-content">
    <div class="hero-mobile-headline">
      <span>Enabling</span>
      <span>Matters</span>
      <span>What</span>
    </div>

    <div class="hero-mobile-cta">
      <a class="hero-mobile-explore" href="#">
        <span>Explore Now</span>
        <span class="hero-mobile-arrow" aria-hidden="true">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
            <path
              d="M2 7h10M8 3l4 4-4 4"
              stroke="white"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </span>
      </a>

      <div class="hero-mobile-stores">
        <a class="hero-mobile-store-badge" href="#" rel="noopener noreferrer">
          <img
            src="assets/images/app-store.png"
            alt="Download on the App Store"
            loading="lazy"
          />
        </a>
        <a class="hero-mobile-store-badge" href="#" rel="noopener noreferrer">
          <img
            src="assets/images/google-play.png"
            alt="Get it on Google Play"
            loading="lazy"
          />
        </a>
      </div>
    </div>
  </div>

  <div class="hero-mobile-visual" aria-hidden="true">
    <div class="hero-mobile-blue-circle"></div>
    <div class="hero-mobile-orange-circle"></div>
    <img
      src="../../../../assets/gif/header-screen-v2 2.gif"
      alt=""
      class="hero-mobile-gif"
      loading="eager"
    />
  </div>
</section>
