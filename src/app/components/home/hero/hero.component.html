<section class="hero-section hero-desktop" aria-label="Hero">
  <!-- طبقة البيل الكبيرة (تكبر وتملأ المشهد كما في الفيديو) -->
  <div class="hero-mega-pill" aria-hidden="true"></div>

  <!-- التوجل الصغير: مسار + كرة (مرحلة البداية والنهاية) -->
  <div class="hero-toggle" aria-hidden="true">
    <div class="pill-track"></div>
    <div class="orange-ball"></div>
  </div>

  <div class="hero-headline">
    <span class="h-line line-enabling">Enabling</span>
    <span class="h-line line-what">What</span>
    <span class="h-line line-matters">Matters</span>
  </div>

  <div class="hero-gif-wrap" aria-hidden="true">
    <img
      #desktopHeroGif
      [src]="heroGifSrc"
      alt=""
      class="hero-gif"
      loading="eager"
    />
  </div>

  <div class="hero-cta">
    <a class="download-btn no-underline" href="#">
      <span class="download-btn__label">Explore Now</span>
      <span class="icon-circle" aria-hidden="true">
        <i class="bi bi-arrow-up-right"></i>
      </span>
    </a>
    <div class="store-buttons">
      <a class="store-badge" href="#" rel="noopener noreferrer">
        <img
          src="assets/images/app-store.svg"
          alt="Download on the App Store"
          class="store-badge-img"
          width="135"
          height="40"
          loading="lazy"
        />
      </a>
      <a class="store-badge" href="#" rel="noopener noreferrer">
        <img
          src="assets/images/google-play.svg"
          alt="Get it on Google Play"
          class="store-badge-img"
          width="135"
          height="40"
          loading="lazy"
        />
      </a>
    </div>
  </div>

  <img
    src="assets/images/hero-aur-capital-logo.png"
    alt="AUR Capital"
    class="powered-by"
    width="168"
    height="85"
    loading="eager"
    decoding="async"
  />
</section>

<section class="hero-mobile" aria-label="Hero Mobile">
  <div class="hero-mobile-content">
    <div class="hero-mobile-headline">
      <span>Enabling</span>
      <span>Matters</span>
      <span>What</span>
    </div>

    <div class="hero-mobile-cta">
      <a class="download-btn no-underline" href="#">
        <span class="download-btn__label">Explore Now</span>
        <span class="icon-circle" aria-hidden="true">
          <i class="bi bi-arrow-up-right"></i>
        </span>
      </a>

      <div class="hero-mobile-stores">
        <a class="hero-mobile-store-badge" href="#" rel="noopener noreferrer">
          <img
            src="assets/images/app-store.svg"
            alt="Download on the App Store"
            class="store-badge-img"
            width="135"
            height="40"
            loading="lazy"
          />
        </a>
        <a class="hero-mobile-store-badge" href="#" rel="noopener noreferrer">
          <img
            src="assets/images/google-play.svg"
            alt="Get it on Google Play"
            class="store-badge-img"
            width="135"
            height="40"
            loading="lazy"
          />
        </a>
      </div>
    </div>
  </div>

  <div class="hero-mobile-visual" aria-hidden="true">
    <div class="hero-mobile-blue-circle"></div>
    <div class="hero-mobile-orange-circle"></div>
    <img
      #mobileHeroGif
      [src]="heroGifSrc"
      alt=""
      class="hero-mobile-gif"
      loading="eager"
    />
  </div>
</section>
