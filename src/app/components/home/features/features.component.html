<div class="w-full pt-16 space-y-24">

  <ng-container *ngIf="howSection() as how">
    <div
      class="how-it-works-main h-auto lg:h-[380px] bg-[#eef5ff] rounded-[24px] lg:rounded-[26px] relative flex flex-col-reverse lg:flex-row items-center overflow-hidden min-h-[220px]"
    >
      <div class="how-it-works-visual w-full lg:w-[60%] self-stretch relative min-h-[300px] lg:min-h-[370px]">
        <img
          src="../../../../assets/gif/how waseela works.gif"
          alt="Waseela App"
          class="how-it-works-gif absolute -top-16 lg:-top-10 left-1/2 lg:left-[40%] -translate-x-1/2 w-[50%] lg:w-[140%] max-w-none h-auto object-contain"
        />
      </div>

      <div class="how-it-works-copy w-full lg:w-[52%] flex flex-col justify-start px-6 lg:px-8 py-10 lg:py-0 space-y-2 text-left">
        <div class="how-it-works-inner max-w-[650px]">
          <h2 class="how-it-works-title text-left text-[25px] lg:text-[40px] font-[900] text-[#1D1DDB] leading-[1.1]">
            {{ how.title }}
          </h2>
          <p
            *ngIf="how.description"
            class="how-it-works-desc text-left text-[#252525] text-[15px] max-sm:text-[13px] font-medium leading-[1.5] cms-preline"
          >
            {{ how.description }}
          </p>
        </div>
      </div>
    </div>

    <div class="step-cards-grid grid grid-cols-1 lg:grid-cols-3 gap-4 lg:gap-3 mt-5">
      <ng-container *ngFor="let step of howSteps(); let idx = index">
        <div
          *ngIf="idx === 0"
          class="step-card step-card--blue bg-[#b9e6ff] rounded-[15px] flex flex-col lg:min-h-[500px] overflow-hidden"
        >
          <div class="space-y-4 p-6 lg:p-10 pb-4">
            <h3 class="text-[22px] lg:text-[30px] leading-[1.08] font-black text-[#1D1DDB]">{{ step.title }}</h3>
            <p
              *ngIf="step.description"
              class="text-[#0f2f55] text-[12px] lg:text-[15px] leading-[1.5] font-medium mt-4 max-w-[350px] lg:max-w-[350px] cms-preline"
            >
              {{ step.description }}
            </p>
          </div>
          <div class="step-card-badges flex flex-wrap gap-3 px-4 lg:px-8 mt-2">
            <img
              src="assets/images/app-store.svg"
              class="store-badge-img cursor-pointer hover:scale-105 transition"
              width="135"
              height="40"
              alt="App Store"
            />
            <img
              src="assets/images/google-play.svg"
              class="store-badge-img cursor-pointer hover:scale-105 transition"
              width="135"
              height="40"
              alt="Google Play"
            />
          </div>
          <div class="step-card-visual relative flex-1 mt-2">
            <img
              [src]="stepVisualSrc(idx)"
              class="step-card-img step-card-img--blue absolute -bottom-8 left-1/2 -translate-x-1/3 w-[135%] max-w-none h-auto object-contain"
              alt=""
            />
          </div>
        </div>

        <div
          *ngIf="idx === 1"
          class="step-card step-card--orange bg-[#f87300] rounded-[14px] flex flex-col lg:min-h-[600px] text-white overflow-hidden"
        >
          <div class="space-y-4 p-6 lg:p-10 pb-4">
            <h3 class="text-[22px] lg:text-[30px] leading-[1.08] font-black cms-preline">{{ step.title }}</h3>
            <p *ngIf="step.description" class="opacity-95 font-medium text-[12px] lg:text-[15px] leading-[1.5] mt-4 cms-preline">
              {{ step.description }}
            </p>
          </div>
          <div class="step-card-visual relative flex-1 mt-1">
            <img
              [src]="stepVisualSrc(idx)"
              class="step-card-img step-card-img--orange absolute -bottom-10 left-1/2 -translate-x-1/2 w-[175%] max-w-none h-auto object-contain"
              alt=""
            />
          </div>
        </div>

        <div
          *ngIf="idx === 2"
          class="step-card step-card--navy bg-[#0000ad] rounded-[14px] flex flex-col lg:min-h-[600px] text-white overflow-hidden"
        >
          <div class="space-y-4 p-6 lg:p-10 pb-4">
            <h3 class="text-[22px] lg:text-[30px] leading-[1.08] font-black cms-preline">{{ step.title }}</h3>
            <p *ngIf="step.description" class="opacity-95 font-medium text-[12px] lg:text-[15px] leading-[1.5] mt-4 cms-preline">
              {{ step.description }}
            </p>
          </div>
          <div class="step-card-visual relative flex-1 mt-1">
            <img
              [src]="stepVisualSrc(idx)"
              class="step-card-img step-card-img--navy absolute -bottom-5 left-[35%] -translate-x-1/2 w-[135%] max-w-none h-auto object-contain"
              alt=""
            />
          </div>
        </div>
      </ng-container>
    </div>
  </ng-container>

  <section
    *ngIf="whySection() as why"
    class="why-waseela-section w-full flex flex-col lg:flex-row items-center lg:items-stretch gap-6 lg:gap-8"
  >
    <div class="why-waseela-visual relative">
      <img
        [src]="phoneFrameSrc"
        class="why-waseela-aspect-ratio"
        alt=""
        aria-hidden="true"
      />
      <img
        [src]="phoneFrameSrc"
        class="why-waseela-phone-base"
        alt="Waseela app preview"
      />

      <ng-container *ngFor="let feature of whyItems(); let i = index">
        <img
          [src]="whyOverlaySrc(i)"
          [class.is-visible]="activeCard === feature.id"
          class="why-waseela-phone-overlay"
          [ngStyle]="whyOverlayStyle(i)"
          alt=""
        />
      </ng-container>
    </div>

    <div class="why-waseela-copy w-full min-w-0">
      <h2 class="why-waseela-title">{{ why.title }}</h2>

      <div class="why-waseela-content">
        <div class="why-waseela-track" aria-hidden="true">
          <div
            class="blue-indicator"
            [style.height.%]="featureCount ? 100 / featureCount : 0"
            [style.top.%]="featureCount ? (activeIndex * 100) / featureCount : 0"
          ></div>
        </div>

        <div
          class="why-waseela-cards"
          role="tablist"
          aria-label="Why Waseela features"
        >
          <div
            *ngFor="let feature of whyItems(); let i = index"
            [attr.data-id]="feature.id"
            [attr.data-why-feature]="feature.id"
            (click)="onWhyTabClick(feature.id)"
            [class.active-card]="activeCard === feature.id"
            class="feature-card"
            role="tab"
            [attr.id]="'why-tab-' + feature.id"
            [attr.aria-selected]="activeCard === feature.id"
            [attr.tabindex]="activeCard === feature.id ? 0 : -1"
            (keydown.enter)="onWhyTabClick(feature.id)"
            (keydown.space)="$event.preventDefault(); onWhyTabClick(feature.id)"
            (keydown.arrowdown)="onWhyTabKeydown($event, i, 1)"
            (keydown.arrowup)="onWhyTabKeydown($event, i, -1)"
            (keydown.home)="onWhyTabKeydown($event, i, -i)"
            (keydown.end)="onWhyTabKeydown($event, i, whyItems().length - 1 - i)"
          >
            <h4>{{ feature.title }}</h4>
            <p *ngIf="feature.description" class="cms-preline">
              {{ feature.description }}
            </p>
          </div>
        </div>
      </div>
    </div>
  </section>

</div>
