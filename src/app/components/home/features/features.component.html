<div class="container mx-auto px-6 pt-16 space-y-24">

  <ng-container *ngIf="howSection() as how">
    <div
      class="how-it-works-main h-auto lg:h-[350px] bg-[#eef5ff] rounded-[24px] md:rounded-[26px] relative flex flex-col-reverse lg:flex-row items-center overflow-hidden min-h-[220px]"
    >
      <div class="how-it-works-visual w-full lg:w-[60%] self-stretch relative min-h-[300px] lg:min-h-[350px]">
        <img
          src="../../../../assets/gif/how waseela works.gif"
          alt="Waseela App"
          class="how-it-works-gif absolute -top-16 lg:-top-10 left-1/2 lg:left-[40%] -translate-x-1/2 w-[50%] lg:w-[135%] max-w-none h-auto object-contain"
        />
      </div>

      <div class="w-full lg:w-[52%] flex flex-col justify-start px-6 md:px-10 lg:px-12 py-10 lg:py-0 space-y-4 text-center lg:text-left">
        <div class="max-w-[650px]">
          <h2 class="text-left text-[25px] md:text-[40px] font-[900] text-[#1D1DDB] leading-[1.1] mb-4">
            {{ how.title }}
          </h2>
          <p
            *ngIf="how.description"
            class="text-left text-[#252525] text-[15px] max-sm:text-[13px] font-medium leading-[1.5] cms-preline"
          >
            {{ how.description }}
          </p>
        </div>
      </div>
    </div>

    <div class="step-cards-grid grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-3 mt-5">
      <ng-container *ngFor="let step of howSteps(); let idx = index">
        <div
          *ngIf="idx === 0"
          class="step-card bg-[#b9e6ff] rounded-[15px] flex flex-col min-h-[500px] overflow-hidden"
        >
          <div class="space-y-4 p-6 md:p-10 pb-4">
            <h3 class="text-[22px] md:text-[30px] leading-[1.08] font-black text-[#1D1DDB]">{{ step.title }}</h3>
            <p
              *ngIf="step.description"
              class="text-[#0f2f55] text-[12px] md:text-[15px] leading-[1.5] font-medium mt-4 max-w-[350px] cms-preline"
            >
              {{ step.description }}
            </p>
          </div>
          <div class="flex flex-wrap gap-3 px-4 md:px-8 mt-2">
            <img
              src="../../../../assets/images/Mobile app store badge (2).png"
              class="h-10 md:h-11 cursor-pointer hover:scale-105 transition"
              alt="App Store"
            />
            <img
              src="../../../../assets/images/Mobile app store badge (3).png"
              class="h-10 md:h-11 cursor-pointer hover:scale-105 transition"
              alt="Google Play"
            />
          </div>
          <div class="step-card-visual relative flex-1 mt-2">
            <img
              [src]="stepVisualSrc(idx)"
              class="step-card-img step-card-img--blue absolute -bottom-8 left-1/2 -translate-x-1/3 w-[135%] max-w-none h-auto object-contain"
              alt=""
            />
          </div>
        </div>

        <div
          *ngIf="idx === 1"
          class="step-card bg-[#f87300] rounded-[14px] flex flex-col min-h-[600px] text-white overflow-hidden"
        >
          <div class="space-y-4 p-6 md:p-10 pb-4">
            <h3 class="text-[22px] md:text-[30px] leading-[1.08] font-black cms-preline">{{ step.title }}</h3>
            <p *ngIf="step.description" class="opacity-95 font-medium text-[12px] md:text-[15px] leading-[1.5] mt-4 cms-preline">
              {{ step.description }}
            </p>
          </div>
          <div class="step-card-visual relative flex-1 mt-1">
            <img
              [src]="stepVisualSrc(idx)"
              class="step-card-img step-card-img--orange absolute -bottom-10 left-1/2 -translate-x-1/2 w-[175%] max-w-none h-auto object-contain"
              alt=""
            />
          </div>
        </div>

        <div
          *ngIf="idx === 2"
          class="step-card bg-[#0000ad] rounded-[14px] flex flex-col min-h-[600px] text-white overflow-hidden"
        >
          <div class="space-y-4 p-6 md:p-10 pb-4">
            <h3 class="text-[22px] md:text-[30px] leading-[1.08] font-black cms-preline">{{ step.title }}</h3>
            <p *ngIf="step.description" class="opacity-95 font-medium text-[12px] md:text-[15px] leading-[1.5] mt-4 cms-preline">
              {{ step.description }}
            </p>
          </div>
          <div class="step-card-visual relative flex-1 mt-1">
            <img
              [src]="stepVisualSrc(idx)"
              class="step-card-img step-card-img--navy absolute -bottom-5 left-[35%] -translate-x-1/2 w-[135%] max-w-none h-auto object-contain"
              alt=""
            />
          </div>
        </div>
      </ng-container>
    </div>
  </ng-container>

  <section
    *ngIf="whySection() as why"
    class="why-waseela-section mt-4 container mx-auto px-2 py-2 md:py-2 flex flex-col lg:flex-row items-stretch lg:items-center gap-5 lg:gap-10"
  >
    <div class="why-waseela-visual w-full lg:w-1/1 relative">
      <img
        src="../../../../assets/images/Slide 16_9 - 5 3.png"
        class="why-waseela-phone-base"
        alt="Waseela app preview"
      />

      <ng-container *ngFor="let feature of whyItems(); let i = index">
        <img
          [src]="whyOverlaySrc(i)"
          [class.opacity-100]="activeCard === feature.id"
          [class.opacity-0]="activeCard !== feature.id"
          class="why-waseela-phone-overlay transition-opacity duration-500 ease-in-out w-[185%]"
          alt=""
        />
      </ng-container>
    </div>

    <div class="w-full lg:w-1/1">
      <h2 class="why-waseela-title">{{ why.title }}</h2>

      <div class="why-waseela-content">
        <div class="why-waseela-track block">
          <div
            class="blue-indicator"
            [style.height.%]="featureCount ? 100 / featureCount : 0"
            [style.top.%]="featureCount ? (activeIndex * 100) / featureCount : 0"
            [style.opacity]="activeCard > 0 ? 1 : 0"
          ></div>
        </div>

        <div class="why-waseela-cards">
          <div
            *ngFor="let feature of whyItems()"
            [attr.data-id]="feature.id"
            [attr.data-why-feature]="feature.id"
            (click)="setActive(feature.id)"
            [class.active-card]="activeCard === feature.id"
            class="feature-card"
            role="button"
            tabindex="0"
            (keydown.enter)="setActive(feature.id)"
            (keydown.space)="$event.preventDefault(); setActive(feature.id)"
          >
            <h4>{{ feature.title }}</h4>
            <p *ngIf="feature.description" class="cms-preline">{{ feature.description }}</p>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
