<nav class="bg-white py-3 shadow- fixed top-0 w-full z-50">
  <div class="-main-container mx-auto px-4 flex justify-between items-center:">

    <div class="flex items-center">
      <span class="text-4xl font-black text-[#1D1DDB] tracking-tight">Waseela</span>
      <span class="w-2.5 h-2.5 ml-1.5 mt-4 rounded-full bg-[#FF6B00]"></span>
    </div>

    <div class="hidden md:flex items-center space-x-20">
      <a
        routerLink="/"
        routerLinkActive="text-[#1D1DDB] font-bold border-b-[#1D1DDB]"
        [routerLinkActiveOptions]="{ exact: true }"
        class="fs-5 border-b-2 border-transparent pb-1 font-semibold text-gray-500 transition-colors hover:text-[#1D1DDB]"
        >Home</a

      <a
        routerLink="/merchants"
        routerLinkActive="text-[#1D1DDB] font-bold border-b-[#1D1DDB]"

      >
      <a
        routerLink="/categories"
        routerLinkActive="text-[#1D1DDB] font-bold border-b-[#1D1DDB]"

        >Categories</a
      >
      <a
        routerLink="/about-us"
        routerLinkActive="text-[#1D1DDB] font-bold border-b-[#1D1DDB]"
        class="fs-5 border-b-2 border-transparent pb-1 font-semibold text-gray-500 transition-colors hover:text-[#1D1DDB]"

      >
    </div>

    <div class="flex items-center">
      <button class="download-btn group">
        <span class="btn-text">Download now</span>
        <span class="icon-circle">
          <i class="bi bi-arrow-up-right"></i>
        </span>
      </button>
    </div>

  </div>
</nav>
