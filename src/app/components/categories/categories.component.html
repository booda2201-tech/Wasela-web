<section class="py-12 md:py-16 lg:py-20 bg-white">
  <div class="container mx-auto px-4 md:px-5 lg:px-6 py-10 md:py-12 lg:py-16 text-center">

    <h2 class="text-[#1D1DDB] text-[30px] md:text-[36px] lg:text-4xl leading-[1.1] font-[900] mb-3 md:mb-4">Categories We Finance</h2>
    <p class="text-gray-400 text-sm md:text-base max-w-[92%] md:max-w-2xl mx-auto mb-10 md:mb-12 lg:mb-16">Waseela provides a wide range of Everyday Essentials to help individuals and families feel secure and move forward confidently.</p>

<!-- Categories Loop -->
    <div *ngFor="let cat of categories" class="mb-16 md:mb-24 lg:mb-32 last:mb-0">

      <!-- Masked Image -->
<div class="relative flex justify-center mb-8 md:mb-14 lg:mb-20 min-h-[170px] md:min-h-[240px] lg:min-h-[400px]">
  <div class="category-blob-wrapper relative">

    <!-- الطبقة الأولى: صورة الماسك الزرقاء (دي اللي مقصوصة أو هي أصلاً شكل جاهز) -->
    <div class="blob-bg absolute inset-0 z-10">
      <img [src]="cat.mask" class="w-full h-full object-contain transform scale-[0.99] translate-x-[5%]">
    </div>

    <!-- الطبقة الثانية: صورة المحتوى (الطالب/العربية) - شيلنا الـ mask عشان متبقاش مقصوصة -->
    <div class="image-content-container relative z-20">
      <img [src]="cat.img" class="w-full h-full object-contain">
    </div>

  </div>
</div>
   
      <!-- Category Text Info -->
      <h3 class="text-[#1D1DDB] text-2xl md:text-[30px] lg:text-3xl font-black mb-2 md:mb-3">{{cat.title}}</h3>
      <p class="text-gray-400 text-sm md:text-base font-medium mb-8 md:mb-10 lg:mb-12 max-w-[95%] md:max-w-md mx-auto">{{cat.description}}</p>

      <!-- Sub-items Cards -->
      <div class="flex flex-wrap justify-center gap-3 md:gap-6 lg:gap-8 max-w-3xl mx-auto">
        <div *ngFor="let sub of cat.subItems"
              [ngClass]="sub.color"
              class="flex flex-col items-center justify-center w-[35%] sm:w-[80px] md:w-40 lg:w-44 h-[100px] md:h-[122px] lg:h-32 rounded-[16px] md:rounded-[20px] 
              transition-all duration-300 hover:shadow-2xl hover:-translate-y-2 
              cursor-pointer border border-transparent hover:border-blue-100">
          <img [src]="sub.icon" class="w-8 h-8 md:w-9 md:h-9 lg:w-10 lg:h-10 mb-2 md:mb-3 lg:mb-4 object-contain">
          <span class="text-[#1D1DDB] font-bold text-[12px] md:text-sm text-center px-2 md:px-4">{{sub.name}}</span>
        </div>
      </div>

    </div>
  </div>
</section>
