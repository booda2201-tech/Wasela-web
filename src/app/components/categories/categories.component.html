<section class="py-20 bg-white" *ngIf="!loading && !loadError && page">
  <div class="container mx-auto px-6 py-16 text-center">
    <ng-container *ngIf="heroSection() as hero">
      <h2 class="text-[#1D1DDB] text-4xl font-[900] mb-4">{{ hero.title }}</h2>
      <p class="text-gray-400 max-w-2xl mx-auto mb-16">{{ hero.description }}</p>
    </ng-container>

    <div *ngFor="let cat of categorySections()" class="mb-32 last:mb-0">
      <div class="relative flex justify-center mb-20 min-h-[400px]">
        <div class="category-blob-wrapper relative">
          <div class="blob-bg absolute inset-0 z-10">
            <img
              src="assets/images/Vector 6.png"
              class="w-full h-full object-contain transform scale-[0.99] translate-x-[5%]"
              alt=""
            />
          </div>

          <div class="image-content-container relative z-20">
            <img
              *ngIf="sectionImage(cat) as sectionImg"
              [src]="sectionImg"
              class="w-full h-full object-contain"
              [alt]="cat.title || ''"
            />
          </div>
        </div>
      </div>

      <h3 class="text-[#1D1DDB] text-3xl font-black mb-3">{{ cat.title }}</h3>
      <p class="text-gray-400 text-base font-medium mb-12 max-w-md mx-auto">{{ cat.description }}</p>

      <div class="flex flex-wrap justify-center gap-8 max-w-3xl mx-auto">
        <div
          *ngFor="let sub of activeItems(cat); let i = index"
          [ngClass]="i % 2 === 0 ? 'bg-[#F3F4FF]' : 'bg-[#FFF8F3]'"
          class="flex flex-col items-center justify-center w-44 h-32 rounded-[20px] transition-all duration-300 hover:shadow-2xl hover:-translate-y-2 cursor-pointer border border-transparent hover:border-blue-100"
        >
          <img
            *ngIf="itemImage(sub) as subImg"
            [src]="subImg"
            class="w-10 h-10 mb-4 object-contain"
            [alt]="sub.title || ''"
          />
          <span class="text-[#1D1DDB] font-bold text-sm text-center px-4">{{ sub.title }}</span>
        </div>
      </div>
    </div>
  </div>
</section>

<div class="py-20 text-center" *ngIf="loading">Loading...</div>
<div class="py-20 text-center text-red-500" *ngIf="loadError">
  تعذر تحميل صفحة Categories.
</div>
